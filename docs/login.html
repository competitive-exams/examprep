<title>Login — Competitive Exams</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0b1929;--bg2:#0f2035;--bg3:#162844;--mint:#7dd8a4;--mint2:#a8eac4;--mint3:rgba(125,216,164,0.12);--white:#eef8f2;--white2:#9db8aa;--white3:#5a7a6a;--border:rgba(125,216,164,0.12);--border2:rgba(125,216,164,0.25);--red:#ff8a8a;--red-bg:rgba(255,138,138,0.1);}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.glow{position:fixed;top:-20%;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(125,216,164,0.13) 0%,transparent 70%);pointer-events:none;z-index:0;}
.grid{position:fixed;inset:0;background-image:linear-gradient(rgba(125,216,164,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(125,216,164,0.03) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:2.5rem;width:100%;max-width:420px;position:relative;z-index:1;animation:fadeUp 0.5s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.logo-row{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:2rem;}
.logo-img{width:40px;height:40px;border-radius:8px;}
.logo-name{font-size:16px;font-weight:600;}
.tabs{display:flex;background:var(--bg3);border-radius:10px;padding:4px;margin-bottom:1.5rem;}
.tab{flex:1;padding:9px;text-align:center;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;color:var(--white2);border:none;background:none;font-family:inherit;transition:all 0.2s;}
.tab.active{background:var(--mint3);color:var(--mint);border:1px solid var(--border2);}
.form-group{margin-bottom:1rem;}
label{display:block;font-size:13px;font-weight:500;color:var(--white2);margin-bottom:6px;}
input{width:100%;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--white);font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s;}
input:focus{border-color:var(--border2);}
input::placeholder{color:var(--white3);}
.btn{width:100%;padding:14px;background:var(--mint);color:#0b1929;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-top:0.5rem;}
.btn:hover{background:var(--mint2);}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:1rem;display:none;}
.msg.error{background:var(--red-bg);border:1px solid rgba(255,138,138,0.3);color:var(--red);}
.msg.success{background:var(--mint3);border:1px solid var(--border2);color:var(--mint);}
.back{display:block;text-align:center;margin-top:1.5rem;font-size:13px;color:var(--white3);text-decoration:none;}
.back:hover{color:var(--mint);}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(11,25,41,0.3);border-top-color:#0b1929;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Log In</button>

  <div id="msg" class="msg"></div>
  <div id="login-form">
    <div class="form-group"><label>Email address</label><input type="email" id="l-email" placeholder="you@email.com"/></div>
    <div class="form-group"><label>Password</label><input type="password" id="l-pass" placeholder="Your password" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="btn" id="l-btn" onclick="doLogin()">Log In →</button>
    <button onclick="switchTab('forgot')" style="background:none;border:none;color:var(--white3);font-size:13px;cursor:pointer;font-family:inherit;margin-top:10px;width:100%;text-align:center;">Forgot password?</button>
  </div>
  <div id="signup-form" style="display:none">
    <div class="form-group"><label>Full name</label><input type="text" id="s-name" placeholder="Your full name"/></div>
    <div class="form-group"><label>Email address</label><input type="email" id="s-email" placeholder="you@email.com"/></div>
    <div class="form-group"><label>Password <span style="color:var(--white3);font-weight:400">(min. 6 characters)</span></label><input type="password" id="s-pass" placeholder="Create a password" onkeydown="if(event.key==='Enter')doSignup()"/></div>
    <button class="btn" id="s-btn" onclick="doSignup()">Create Account →</button>
  </div>
  <div id="forgot-form" style="display:none">
  <p style="font-size:13px;color:var(--white2);margin-bottom:1rem;line-height:1.6;">
    Enter your email address and we'll send you a link to reset your password.
  </p>
  <div class="form-group">
    <label>Email address</label>
    <input type="email" id="f-email" placeholder="you@email.com"/>
  </div>
  <button class="btn" id="f-btn" onclick="doForgotPassword()">Send Reset Link →</button>
  <button onclick="switchTab('login')" style="background:none;border:none;color:var(--white3);font-size:13px;cursor:pointer;font-family:inherit;margin-top:12px;width:100%;text-align:center;">← Back to Login</button>
</div>

<script>
const { createClient } = supabase;
const sb = createClient('https://iugqkcvnzcvyvvbeistr.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1Z3FrY3ZuemN2eXZ2YmVpc3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNDU1MDgsImV4cCI6MjA5NDgyMTUwOH0.qYw0DCUn49TBoKr6LHfrvJGlPEMsbRLXGXz7Zux5U8o');

sb.auth.getSession().then(({data:{session}})=>{ if(session) location.href='dashboard.html'; });

function switchTab(t){
  document.getElementById('login-form').style.display=t==='login'?'block':'none';
  document.getElementById('signup-form').style.display=t==='signup'?'block':'none';
  document.getElementById('forgot-form').style.display=t==='forgot'?'block':'none';
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',(t==='login'&&i===0)||(t==='signup'&&i===1)));
  hide();
}
function show(type,text){const el=document.getElementById('msg');el.className='msg '+type;el.textContent=text;el.style.display='block';}
function hide(){const el=document.getElementById('msg');el.style.display='none';}
function loading(id,on,label){const b=document.getElementById(id);b.disabled=on;b.innerHTML=on?'<span class="spinner"></span>Please wait…':label;}

async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  if(!email||!pass){show('error','Please fill in all fields.');return;}
  loading('l-btn',true,'Log In →');
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){loading('l-btn',false,'Log In →');show('error',error.message==='Invalid login credentials'?'Wrong email or password. Please try again.':error.message);}
  else location.href='dashboard.html';
}
async function doForgotPassword(){
  const email = document.getElementById('f-email').value.trim();
  if(!email){ show('error','Please enter your email address.'); return; }
  loading('f-btn', true, 'Send Reset Link →');
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: 'https://competitive-exams.github.io/examprep/reset-password.html'
  });
  loading('f-btn', false, 'Send Reset Link →');
  if(error){ show('error', error.message); }
  else { show('success', '✅ Reset link sent! Check your email inbox (and spam folder).'); }
}
  
async function doSignup(){
  const name=document.getElementById('s-name').value.trim();
  const email=document.getElementById('s-email').value.trim();
  const pass=document.getElementById('s-pass').value;
  if(!name||!email||!pass){show('error','Please fill in all fields.');return;}
  if(pass.length<6){show('error','Password must be at least 6 characters.');return;}
  loading('s-btn',true,'Create Account →');
  const {data,error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name}}});
  if(error){loading('s-btn',false,'Create Account →');show('error',error.message);}
  else if(data.session){location.href='dashboard.html';}
  else{loading('s-btn',false,'Create Account →');show('success','Account created! You can now log in.');}
}
</script>
