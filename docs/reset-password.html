<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password — Competitive Exams</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0b1929;--bg2:#0f2035;--bg3:#162844;--mint:#7dd8a4;--mint2:#a8eac4;--mint3:rgba(125,216,164,0.12);--white:#eef8f2;--white2:#9db8aa;--white3:#5a7a6a;--border:rgba(125,216,164,0.12);--border2:rgba(125,216,164,0.25);--red:#ff8a8a;--red-bg:rgba(255,138,138,0.1);}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.glow{position:fixed;top:-20%;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(125,216,164,0.13) 0%,transparent 70%);pointer-events:none;z-index:0;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:2.5rem;width:100%;max-width:420px;position:relative;z-index:1;animation:fadeUp 0.5s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.logo-row{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:2rem;}
.logo-name{font-size:16px;font-weight:600;}
h2{font-size:20px;font-weight:700;margin-bottom:6px;text-align:center;}
.subtitle{font-size:13px;color:var(--white2);text-align:center;margin-bottom:1.5rem;line-height:1.6;}
.form-group{margin-bottom:1rem;}
label{display:block;font-size:13px;font-weight:500;color:var(--white2);margin-bottom:6px;}
input{width:100%;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--white);font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s;}
input:focus{border-color:var(--border2);}
input::placeholder{color:var(--white3);}
.btn{width:100%;padding:14px;background:var(--mint);color:#0b1929;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-top:0.5rem;}
.btn:hover{background:var(--mint2);}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:1rem;display:none;}
.msg.error{background:var(--red-bg);border:1px solid rgba(255,138,138,0.3);color:var(--red);}
.msg.success{background:var(--mint3);border:1px solid var(--border2);color:var(--mint);}
.back{display:block;text-align:center;margin-top:1.5rem;font-size:13px;color:var(--white3);text-decoration:none;}
.back:hover{color:var(--mint);}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(11,25,41,0.3);border-top-color:#0b1929;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.lock-icon{font-size:40px;text-align:center;margin-bottom:1rem;}
</style>
</head>
<body>
<div class="glow"></div>
<div class="card">
  <div class="logo-row">
    <span class="logo-name">🔐 Competitive Exams</span>
  </div>
  <div class="lock-icon">🔑</div>
  <h2>Set New Password</h2>
  <p class="subtitle">Enter your new password below.<br>Make it strong and easy to remember!</p>

  <div id="msg" class="msg"></div>

  <div id="reset-form">
    <div class="form-group">
      <label>New Password <span style="color:var(--white3);font-weight:400">(min. 6 characters)</span></label>
      <input type="password" id="new-pass" placeholder="Enter new password"/>
    </div>
    <div class="form-group">
      <label>Confirm New Password</label>
      <input type="password" id="confirm-pass" placeholder="Repeat new password" onkeydown="if(event.key==='Enter')doReset()"/>
    </div>
    <button class="btn" id="reset-btn" onclick="doReset()">Update Password →</button>
  </div>

  <a href="login.html" class="back">← Back to Login</a>
</div>

<script>
const { createClient } = supabase;
const sb = createClient(
  'https://iugqkcvnzcvyvvbeistr.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1Z3FrY3ZuemN2eXZ2YmVpc3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNDU1MDgsImV4cCI6MjA5NDgyMTUwOH0.qYw0DCUn49TBoKr6LHfrvJGlPEMsbRLXGXz7Zux5U8o'
);

function show(type, text){
  const el = document.getElementById('msg');
  el.className = 'msg ' + type;
  el.textContent = text;
  el.style.display = 'block';
}

async function doReset(){
  const newPass    = document.getElementById('new-pass').value;
  const confirmPass = document.getElementById('confirm-pass').value;

  if(!newPass || !confirmPass){
    show('error', 'Please fill in both fields.');
    return;
  }
  if(newPass.length < 6){
    show('error', 'Password must be at least 6 characters.');
    return;
  }
  if(newPass !== confirmPass){
    show('error', 'Passwords do not match. Please try again.');
    return;
  }

  const btn = document.getElementById('reset-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Updating…';

  const { error } = await sb.auth.updateUser({ password: newPass });

  if(error){
    btn.disabled = false;
    btn.innerHTML = 'Update Password →';
    show('error', error.message);
  } else {
    show('success', '✅ Password updated successfully! Redirecting to login…');
    document.getElementById('reset-form').style.display = 'none';
    setTimeout(() => { location.href = 'login.html'; }, 2500);
  }
}
</script>
</body>
</html>
